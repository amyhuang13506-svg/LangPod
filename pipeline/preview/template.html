<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Castlingo Transcript Preview</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", sans-serif;
    background: #0a0a0a;
    color: #eee;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    background: #1a1a1a;
    padding: 14px 24px;
    border-bottom: 1px solid #2a2a2a;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  header h1 { font-size: 16px; font-weight: 600; }
  header .meta { font-size: 13px; color: #888; }
  main {
    flex: 1;
    display: flex;
    overflow: hidden;
  }
  .left {
    flex: 0 0 60%;
    padding: 24px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  video {
    width: 100%;
    background: #000;
    border-radius: 8px;
    aspect-ratio: 16 / 9;
    margin-bottom: 16px;
  }
  .current-subtitle {
    background: #1a1a1a;
    border-radius: 8px;
    padding: 24px;
    flex: 1;
    overflow-y: auto;
  }
  .current-subtitle .en {
    font-size: 22px;
    line-height: 1.6;
    margin-bottom: 12px;
    font-weight: 500;
  }
  .current-subtitle .en .word {
    cursor: pointer;
    padding: 1px 2px;
    border-radius: 3px;
    /* 仅文字颜色变化（不画背景），淡出 350ms 保证连读时短词也能看见 */
    transition: color 350ms ease-out;
  }
  .current-subtitle .en .word:hover { color: #ffd700; }
  .current-subtitle .en .word.active {
    color: #ffd700;
    /* 激活瞬时，跟音频同步 */
    transition: color 0ms;
  }
  .current-subtitle .zh {
    font-size: 17px;
    color: #aaa;
    line-height: 1.7;
  }
  .current-subtitle .empty {
    color: #555;
    font-size: 14px;
    text-align: center;
    padding-top: 40px;
  }
  .right {
    flex: 1;
    background: #131313;
    border-left: 1px solid #2a2a2a;
    overflow-y: auto;
    padding: 16px;
  }
  .right h2 {
    font-size: 12px;
    color: #666;
    text-transform: uppercase;
    margin-bottom: 12px;
    letter-spacing: 0.5px;
  }
  .seg {
    padding: 10px 12px;
    border-radius: 6px;
    margin-bottom: 6px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: background 0.1s;
  }
  .seg:hover { background: #1f1f1f; }
  .seg.active {
    background: #1f2d3a;
    border-left-color: #4a9eff;
  }
  .seg .time {
    font-size: 11px;
    color: #666;
    font-family: monospace;
    margin-bottom: 4px;
  }
  .seg .seg-en {
    font-size: 14px;
    line-height: 1.5;
    margin-bottom: 4px;
  }
  .seg .seg-zh {
    font-size: 12px;
    color: #888;
    line-height: 1.5;
  }
  .stats {
    font-size: 12px;
    color: #666;
    padding: 8px 0 16px 0;
    border-bottom: 1px solid #222;
    margin-bottom: 12px;
  }
</style>
</head>
<body>
<header>
  <h1 id="hdrTitle">Loading…</h1>
  <div class="meta" id="hdrMeta"></div>
</header>
<main>
  <div class="left">
    <video id="player" controls preload="metadata"></video>
    <div class="current-subtitle" id="currentSubtitle">
      <div class="empty">▶️ 播放视频，字幕会同步显示在这里</div>
    </div>
  </div>
  <div class="right" id="segList">
    <h2>📜 字幕列表（点击跳转）</h2>
    <div class="stats" id="stats"></div>
    <div id="segs"></div>
  </div>
</main>

<script>
// 从 URL 参数读 podcast id
const params = new URLSearchParams(location.search);
const PID = params.get('id');

const player = document.getElementById('player');
const subtitleEl = document.getElementById('currentSubtitle');
const segsEl = document.getElementById('segs');
const statsEl = document.getElementById('stats');

let segments = [];
const segNodes = [];
let lastSegIdx = -1;

function escapeHTML(s) {
  if (!s) return '';
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function findSegmentIdx(t) {
  let lo = 0, hi = segments.length - 1;
  while (lo <= hi) {
    const mid = (lo + hi) >> 1;
    const s = segments[mid];
    if (t < s.start) hi = mid - 1;
    else if (t >= s.end) lo = mid + 1;
    else return mid;
  }
  return Math.min(hi, segments.length - 1);
}

function renderCurrentSubtitle(seg, t) {
  if (!seg) {
    subtitleEl.innerHTML = `<div class="empty">▶️ 播放视频，字幕会同步显示在这里</div>`;
    return;
  }
  const words = seg.words || [];
  let enHtml;
  if (words.length > 0) {
    enHtml = words.map((w, i) => {
      const active = (t >= w.s && t < w.e) ? ' active' : '';
      return `<span class="word${active}" data-s="${w.s}" data-i="${i}">${escapeHTML(w.w)}</span>`;
    }).join(' ');
  } else {
    enHtml = escapeHTML(seg.en);
  }
  subtitleEl.innerHTML = `
    <div class="en">${enHtml}</div>
    ${seg.zh ? `<div class="zh">${escapeHTML(seg.zh)}</div>` : ''}
  `;
  subtitleEl.querySelectorAll('.word').forEach(el => {
    el.addEventListener('click', () => {
      player.currentTime = parseFloat(el.dataset.s);
      player.play();
    });
  });
}

function updateActiveWord(seg, t) {
  if (!seg || !seg.words) return;
  const wordEls = subtitleEl.querySelectorAll('.word');
  wordEls.forEach((el, i) => {
    const w = seg.words[i];
    if (!w) return;
    if (t >= w.s && t < w.e) el.classList.add('active');
    else el.classList.remove('active');
  });
}

function renderSegmentList() {
  segsEl.innerHTML = '';
  segNodes.length = 0;
  for (let i = 0; i < segments.length; i++) {
    const s = segments[i];
    const node = document.createElement('div');
    node.className = 'seg';
    node.dataset.idx = i;
    const mm = Math.floor(s.start / 60);
    const ss = Math.floor(s.start % 60).toString().padStart(2, '0');
    node.innerHTML = `
      <div class="time">${mm}:${ss}</div>
      <div class="seg-en">${escapeHTML(s.en)}</div>
      ${s.zh ? `<div class="seg-zh">${escapeHTML(s.zh)}</div>` : ''}
    `;
    node.addEventListener('click', () => { player.currentTime = s.start; player.play(); });
    segsEl.appendChild(node);
    segNodes.push(node);
  }
}

player.addEventListener('timeupdate', () => {
  if (!segments.length) return;
  const t = player.currentTime;
  const idx = findSegmentIdx(t);
  if (idx !== lastSegIdx && idx >= 0) {
    if (lastSegIdx >= 0 && segNodes[lastSegIdx]) segNodes[lastSegIdx].classList.remove('active');
    if (segNodes[idx]) {
      segNodes[idx].classList.add('active');
      segNodes[idx].scrollIntoView({block: 'center', behavior: 'smooth'});
    }
    renderCurrentSubtitle(segments[idx], t);
    lastSegIdx = idx;
  } else if (idx >= 0) {
    updateActiveWord(segments[idx], t);
  }
});

async function init() {
  if (!PID) {
    document.body.innerHTML = '<div style="padding:40px;color:#fff">缺少 ?id= 参数</div>';
    return;
  }
  const list = await (await fetch('podcasts.json')).json();
  const meta = list.find(x => x.id === PID);
  if (!meta) {
    document.body.innerHTML = `<div style="padding:40px;color:#fff">未找到 podcast: ${PID}</div>`;
    return;
  }
  document.title = `${meta.title} · Castlingo Preview`;
  document.getElementById('hdrTitle').textContent = meta.title;
  document.getElementById('hdrMeta').textContent = `${meta.speaker} · ${meta.published_at}`;
  player.src = meta.media_url;

  const transcript = await (await fetch(`transcripts/${PID}.json`)).json();
  segments = transcript.segments || [];
  const totalWords = segments.reduce((n, s) => n + (s.words?.length || 0), 0);
  const totalDuration = segments.length ? segments[segments.length - 1].end : 0;
  statsEl.textContent = `${segments.length} 段 · ${totalWords} 词 · ${(totalDuration/60).toFixed(1)} 分钟`;
  renderSegmentList();
}
init();
</script>
</body>
</html>
