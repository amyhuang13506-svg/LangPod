<!DOCTYPE html>
<html lang="zh-Hans">
<head>
<meta charset="UTF-8">
<title>Castlingo — App Store Screenshots (5)</title>
<script>
  // Export mode: ?screen=N renders one screen at full 1290x2796 (no scale, no padding).
  (function () {
    var p = new URLSearchParams(window.location.search);
    var n = p.get('screen');
    if (n) document.documentElement.setAttribute('data-screen', n);
  })();
</script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #1e1e20;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Helvetica Neue", sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  body {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 60px;
    padding: 60px;
  }

  /* ============ Frame ============ */
  .screenshot {
    width: 1290px;
    height: 2796px;
    background: #F2F4F9;
    position: relative;
    overflow: hidden;
    transform-origin: top center;
    transform: scale(0.33);
    margin-bottom: -1880px;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.06);
  }

  /* ============ Title block (screens 2-5) ============ */
  .title-block {
    position: absolute;
    top: 230px;
    left: 100px;
    right: 100px;
    z-index: 4;
  }
  .title {
    font-size: 132px;
    font-weight: 900;
    line-height: 1.05;
    letter-spacing: -4px;
    color: #0B0F1A;
  }
  .title em {
    font-style: normal;
    color: #2563EB;
  }
  .subtitle {
    margin-top: 38px;
    font-size: 42px;
    font-weight: 500;
    line-height: 1.5;
    color: #5e6b88;
    letter-spacing: 0.3px;
  }

  /* ============ Screenshot card (screens 2-5) ============ */
  .shot {
    position: absolute;
    top: 880px;
    left: 50%;
    transform: translateX(-50%);
    width: 980px;
    border-radius: 64px;
    overflow: hidden;
    box-shadow:
      0 60px 130px rgba(20, 35, 80, 0.20),
      0 22px 50px rgba(20, 35, 80, 0.10),
      0 0 0 1px rgba(255,255,255,0.6);
    z-index: 3;
  }
  .shot img {
    width: 100%;
    display: block;
  }

  /* Subtle ambient blue glow under card */
  .ambient {
    position: absolute;
    top: 1400px;
    left: 50%;
    transform: translateX(-50%);
    width: 1200px;
    height: 900px;
    background: radial-gradient(closest-side, rgba(86, 128, 232, 0.20), transparent 70%);
    filter: blur(20px);
    pointer-events: none;
    z-index: 2;
  }

  /* ============================================================
     COVER SCREEN (s1)
     ============================================================ */
  .s1 {
    background:
      radial-gradient(ellipse 1200px 900px at 50% 30%, #ffffff 0%, #F2F4F9 60%),
      #F2F4F9;
  }

  /* Brand logo top-left */
  .brand {
    position: absolute;
    top: 180px;
    left: 100px;
    display: flex;
    align-items: center;
    gap: 22px;
    z-index: 5;
  }
  .brand-mark {
    width: 88px;
    height: 88px;
    border-radius: 22px;
    background: linear-gradient(135deg, #2563EB 0%, #3b5fc9 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 12px 28px rgba(37, 99, 235, 0.32);
  }
  .brand-mark svg { width: 52px; height: 52px; }
  .brand-name {
    font-size: 56px;
    font-weight: 800;
    color: #0B0F1A;
    letter-spacing: -1px;
  }

  .s1 .title-block {
    top: 320px;
  }
  .s1 .title {
    font-size: 124px;
    line-height: 1.08;
  }
  .s1 .title em { color: #2563EB; }
  .s1 .subtitle {
    margin-top: 34px;
    font-size: 38px;
    color: #5e6b88;
  }

  /* Hero phone (cover): centered, slightly tilted */
  .hero-phone {
    position: absolute;
    top: 880px;
    left: 50%;
    transform: translateX(-50%) rotate(-3deg);
    width: 800px;
    border-radius: 56px;
    overflow: hidden;
    box-shadow:
      0 60px 130px rgba(20, 35, 80, 0.24),
      0 22px 50px rgba(20, 35, 80, 0.12),
      0 0 0 1px rgba(255,255,255,0.6);
    z-index: 3;
  }
  .hero-phone img {
    width: 100%;
    display: block;
  }

  /* YouTube play icon decoration */
  .yt-badge {
    position: absolute;
    top: 980px;
    right: 90px;
    width: 168px;
    height: 168px;
    background: #ffffff;
    border-radius: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 24px 50px rgba(220, 50, 50, 0.30), 0 0 0 1px rgba(0,0,0,0.04);
    z-index: 5;
    transform: rotate(6deg);
  }
  .yt-badge .yt-rect {
    width: 110px;
    height: 78px;
    background: #FF0033;
    border-radius: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .yt-badge .yt-tri {
    width: 0;
    height: 0;
    border-style: solid;
    border-width: 18px 0 18px 28px;
    border-color: transparent transparent transparent #ffffff;
    margin-left: 6px;
  }

  /* 3 floating pills on the right */
  .pill {
    position: absolute;
    padding: 22px 50px;
    font-size: 44px;
    font-weight: 700;
    border-radius: 999px;
    z-index: 5;
    letter-spacing: 1px;
  }
  .pill-fun {
    top: 1280px;
    right: 60px;
    background: #ffffff;
    color: #2563EB;
    box-shadow: 0 18px 40px rgba(37, 99, 235, 0.18), 0 0 0 2px rgba(37,99,235,0.12);
  }
  .pill-prac {
    top: 1430px;
    right: 110px;
    background: #2563EB;
    color: #ffffff;
    box-shadow: 0 18px 40px rgba(37, 99, 235, 0.36);
  }
  .pill-eff {
    top: 1580px;
    right: 60px;
    background: #1f3da3;
    color: #ffffff;
    box-shadow: 0 18px 40px rgba(31, 61, 163, 0.36);
  }

  /* Bottom blue ribbon */
  .ribbon {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    height: 360px;
    background: linear-gradient(180deg, #2c5fdc 0%, #1e4bc4 100%);
    clip-path: polygon(0 22%, 100% 0, 100% 100%, 0 100%);
    z-index: 4;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 0;
    padding-top: 60px;
  }
  .ribbon-text {
    color: #ffffff;
    text-align: center;
    font-weight: 700;
    line-height: 1.35;
    letter-spacing: 1px;
  }
  .ribbon-l1 { font-size: 50px; }
  .ribbon-l2 {
    font-size: 50px;
    margin-top: 6px;
  }
  /* Laurels around ribbon text */
  .laurel {
    position: absolute;
    bottom: 88px;
    width: 80px;
    height: 160px;
    color: rgba(255,255,255,0.55);
  }
  .laurel-l { left: 280px; transform: scaleX(-1); }
  .laurel-r { right: 280px; }
  .laurel svg { width: 100%; height: 100%; }

  /* ============================================================
     SCREEN-SPECIFIC backgrounds (subtle variation)
     ============================================================ */
  .s2 { background: #F2F4F9; }
  .s3 { background: #F2F4F9; }
  .s4 { background: #F2F4F9; }
  .s5 { background: #F2F4F9; }

  /* ============================================================
     EXPORT MODE — render one screen at native 1290x2796
     Activated by ?screen=N query string. See <script> in <head>.
     ============================================================ */
  html[data-screen] body {
    display: block;
    gap: 0;
    padding: 0;
    margin: 0;
    background: transparent;
  }
  html[data-screen] .screenshot {
    transform: none !important;
    margin: 0 !important;
    border-radius: 0;
    box-shadow: none;
    display: none;
  }
  html[data-screen="1"] .s1,
  html[data-screen="2"] .s2,
  html[data-screen="3"] .s3,
  html[data-screen="4"] .s4,
  html[data-screen="5"] .s5 { display: block; }
</style>
</head>
